<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Encryption Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="threejs-background"></div>
    <div class="container">
        <h1>Advanced Encryption & Decryption Tool</h1>
        <div class="form-group">
            <label for="algorithm">Select Algorithm:</label>
            <select id="algorithm">
                <option value="rsa">RSA</option>
                <option value="aes">AES</option>
                <option value="des">DES</option>
                <option value="3des">3DES</option>
                <option value="caesar">Caesar Cipher</option>
                <option value="playfair">Playfair Cipher</option>
                <option value="hill">Hill Cipher</option>
                <option value="substitution">Substitution Cipher</option>
                <option value="simpleblock">Simple Block Cipher</option>
            </select>
        </div>
        <div class="form-group">
            <label for="key">Key:</label>
            <input type="text" id="key" placeholder="Enter key (e.g., shift for Caesar, matrix for Hill)">
        </div>
        <div class="form-group">
            <label for="input-text">Input Text:</label>
            <textarea id="input-text" placeholder="Enter plaintext or ciphertext"></textarea>
        </div>
        <div class="buttons">
            <button id="encrypt-btn">Encrypt</button>
            <button id="decrypt-btn">Decrypt</button>
        </div>
        <div class="output-group">
            <label for="output-text">Result:</label>
            <textarea id="output-text" readonly></textarea>
            <button id="copy-btn">Copy to Clipboard</button>
        </div>
        <div id="loader" class="loader hidden"></div>
        <div id="tooltip" class="tooltip hidden"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="rsa.js"></script>
    <script src="aes.js"></script>
    <script src="des.js"></script>
    <script src="3des.js"></script>
    <script src="caesar.js"></script>
    <script src="playfair.js"></script>
    <script src="hill.js"></script>
    <script src="substitution.js"></script>
    <script src="simpleblock.js"></script>
    <script src="script.js"></script>
</body>
</html>
